<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PH Evo Bridge</title>
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#071018; color:#e8f4ff; }
    .app { padding:16px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .card { border:1px solid rgba(125,220,255,.28); border-radius:14px; padding:12px; background:rgba(255,255,255,.04); }
    button { background:#34d3ff; color:#041018; border:0; padding:10px 12px; border-radius:10px; font-weight:700; cursor:pointer; }
    pre { white-space:pre-wrap; font-size:11px; background:#02070b; padding:10px; border-radius:10px; max-height:220px; overflow:auto; }
    .orb { width:10px; height:10px; border-radius:50%; background:#31f6a2; display:inline-block; margin-right:6px; box-shadow:0 0 16px #31f6a2; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:.55 } 50% { transform:scale(1.2); opacity:1 } }
  </style>
</head>
<body>
  <div class="app">
    <h1><span class="orb"></span>PH Evo Bridge</h1>
    <p>PromptBridge client. PH Evo API is gateway. Evo LM is the model.</p>
    <div class="grid">
      <div class="card"><h3>Capture</h3><button id="capture">Capture Current Chat</button></div>
      <div class="card"><h3>Health</h3><button id="health">Check Local Gateway</button></div>
    </div>
    <h3>Output</h3><pre id="out">Idle.</pre>
  </div>
<script src="app.js"></script>
</body>
</html>
