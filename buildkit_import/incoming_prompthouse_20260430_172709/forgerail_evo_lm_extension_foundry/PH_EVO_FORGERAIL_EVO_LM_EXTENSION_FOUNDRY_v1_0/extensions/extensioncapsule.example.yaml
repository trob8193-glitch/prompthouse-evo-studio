extension:
  name: PromptHouse Proof Deck VS Code Panel
  type: vscode_extension
  purpose: show Proof Deck receipts inside VS Code
  version: 0.1.0
owner:
  lead_bot: Dev
  support_bots: [Builder, Verifier, Boundary, Ledger]
risk:
  level: medium
  approval_required: true
targets: [vscode, github_actions, prompthouse_studio]
artifacts:
  - package.json
  - extension.js
  - README.md
install:
  mode: manual_until_verified
  command: code --install-extension generated-vsix
tests:
  - command registers
  - proof receipt loads
  - no secret values rendered
proof:
  - build log
  - extension host screenshot
  - manual install receipt
rollback: uninstall extension and remove generated files
