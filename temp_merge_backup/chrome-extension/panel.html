<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PH Evo Side Panel</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: #f5c842;
    }
    .chat-container {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 85%;
    }
    .message.user {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
    }
    .message.evo {
      background: #1e293b;
      border: 1px solid #334155;
      align-self: flex-start;
    }
    .input-area {
      padding: 16px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      font-size: 13px;
      outline: none;
    }
    input:focus {
      border-color: #3b82f6;
    }
    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
    .controls {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: #0f172a;
    }
    .control-btn {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 11px;
      padding: 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .control-btn:hover {
      background: #334155;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦁 PH Evo Agent</h1>
    <div id="status" style="width: 8px; height: 8px; border-radius: 50%; background: #22c55e;"></div>
  </div>
  
  <div class="controls">
    <button class="control-btn" id="btn-scan">Scan Page (Meta Map)</button>
    <button class="control-btn" id="btn-capture">Capture Context</button>
  </div>

  <div class="chat-container" id="chat">
    <div class="message evo">I am your Meta-Autonomous bridge agent. I can read this page, click elements, and connect directly to your Studio.</div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Command Evo...">
    <button id="send">Send</button>
  </div>

  <script src="panel.js"></script>
</body>
</html>
