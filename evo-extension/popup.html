<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evo Eyes Control</title>
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
    }
    h2 {
      color: #58a6ff;
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #f85149;
      margin-right: 8px;
    }
    .indicator.active {
      background-color: #2ea043;
      box-shadow: 0 0 8px #2ea043;
    }
    button {
      background-color: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 16px;
      width: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      transition: all 0.2s;
    }
    button:hover {
      background-color: #30363d;
    }
    button.active {
      background-color: #238636;
      border-color: #2ea043;
      color: white;
    }
    .logs {
      margin-top: 16px;
      font-family: monospace;
      font-size: 11px;
      color: #8b949e;
      background: #010409;
      padding: 8px;
      border-radius: 4px;
      height: 80px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h2>Evo Eyes — Meta Extension</h2>
  <div class="status">
    <div id="statusIndicator" class="indicator"></div>
    <span id="statusText">Autonomous Mode: OFF</span>
  </div>
  <button id="toggleBtn">Engage Autonomous Scan</button>
  
  <div class="logs">
    <div>[SYS] Connection to Bridge ready.</div>
    <div id="logOutput"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
