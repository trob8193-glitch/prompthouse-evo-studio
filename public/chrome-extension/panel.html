<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PH Evo Side Panel</title>
  <style>
    body { margin: 0; padding: 0; background-color: #030408; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 14px 16px; background: linear-gradient(135deg, #0f172a, #030408); border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 14px; font-weight: 900; background: linear-gradient(90deg, #f5c842, #fb923c); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .chat-container { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    .message { padding: 12px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 88%; position: relative; }
    .message.user { background: #3b82f6; color: white; align-self: flex-end; -webkit-box-shadow: 0 2px 10px rgba(59,130,246,0.2); box-shadow: 0 2px 10px rgba(59,130,246,0.2); }
    .message.evo { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.06); align-self: flex-start; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
    .input-area { padding: 14px 16px; background: #030408; border-top: 1px solid #1e293b; display: flex; gap: 10px; }
    input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid #1e293b; background: #0f172a; color: white; font-size: 13px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #f5c842; }
    button { padding: 10px 18px; border-radius: 10px; border: none; background: #f5c842; color: #0a0800; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
    button:active { transform: scale(0.96); }
    .controls { display: flex; gap: 8px; padding: 10px 16px; background: #030408; border-bottom: 1px solid #1e293b; }
    .control-btn { flex: 1; background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.06); color: #94a3b8; font-size: 11px; padding: 8px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .control-btn:hover { background: rgba(245, 200, 66, 0.1); border-color: rgba(245, 200, 66, 0.3); color: #f5c842; }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; -webkit-box-shadow: 0 0 8px #22c55e; box-shadow: 0 0 8px #22c55e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦁 PH Evo Agent</h1>
    <div id="status" class="status-indicator"></div>
  </div>
  
  <div class="controls">
    <button class="control-btn" id="btn-scan">Scan Page (Meta Map)</button>
    <button class="control-btn" id="btn-capture">Capture Context</button>
  </div>

  <div class="chat-container" id="chat">
    <div class="message evo">I am your Meta-Autonomous bridge agent. I can read this page, click elements, and connect directly to your Studio.</div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Command Evo...">
    <button id="send">Send</button>
  </div>

  <script src="panel.js"></script>
</body>
</html>
